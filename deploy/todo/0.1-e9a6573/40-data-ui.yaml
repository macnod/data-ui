# Generated by scripts/run.sh deploy -- instance todo (todo-0.1-e9a6573)
#
# Lines marked #@repl are kept only when the model's :repl key is true.
# The Swank port is never exposed through a Service; reach it with
#   kubectl -n dataui-todo port-forward deploy/dataui-todo 4005:4005
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataui-todo
  namespace: dataui-todo
  labels:
    app: dataui-todo
    data-ui/instance: todo
    data-ui/version: "todo-0.1-e9a6573"
spec:
  replicas: 1
  # Recreate: the files PVC is ReadWriteOnce.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dataui-todo
  template:
    metadata:
      labels:
        app: dataui-todo
        data-ui/instance: todo
        data-ui/version: "todo-0.1-e9a6573"
    spec:
      initContainers:
        - name: init-db
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataui-todo-secrets
                  key: db-password
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -U dataui; do
                echo "waiting for postgres..."
                sleep 2
              done
              if psql -h postgres -U dataui -d dataui -tAc \
                   "select 1 from information_schema.tables where table_name='users'" \
                   | grep -q 1; then
                echo "Schema already initialized; skipping init SQL."
              else
                psql -h postgres -U dataui -d dataui -v ON_ERROR_STOP=1 \
                     -f /init/init.sql
              fi
          volumeMounts:
            - name: init-sql
              mountPath: /init
      containers:
        - name: data-ui
          image: "macnod/data-ui:todo-0.1-e9a6573"
          imagePullPolicy: IfNotPresent
          env:
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "dataui"
            - name: DB_USER
              value: "dataui"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataui-todo-secrets
                  key: db-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataui-todo-secrets
                  key: admin-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dataui-todo-secrets
                  key: jwt-secret
            - name: DOCUMENT_ROOT
              value: "/app/shared-files/"
            - name: FS_TEMP_DIRECTORY
              value: "/app/temp-files/"
            - name: WEB_DIRECTORY
              value: "/app/web"
            - name: DATAUI_VERSION
              value: "todo-0.1-e9a6573"
            - name: DATAUI_ENVIRONMENT
              value: "demo"
            - name: SWANK_PORT
              value: "4005"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 4005
              name: swank
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: files
              mountPath: /app/shared-files
            - name: temp-files
              mountPath: /app/temp-files
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: dataui-todo-files
        - name: temp-files
          emptyDir: {}
        - name: init-sql
          configMap:
            name: dataui-todo-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: dataui-todo
  namespace: dataui-todo
  labels:
    data-ui/instance: todo
spec:
  type: NodePort
  selector:
    app: dataui-todo
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30300
