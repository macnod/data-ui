# Generated by scripts/run.sh deploy -- instance todo (todo-0.1-e9a6573)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataui-todo-postgres
  namespace: dataui-todo
  labels:
    app: dataui-todo-postgres
    data-ui/instance: todo
spec:
  replicas: 1
  # Recreate so the old pod releases the volume before the new pod mounts it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dataui-todo-postgres
  template:
    metadata:
      labels:
        app: dataui-todo-postgres
        data-ui/instance: todo
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: "dataui"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataui-todo-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dataui"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: dataui-todo-db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dataui-todo
  labels:
    data-ui/instance: todo
spec:
  type: ClusterIP
  selector:
    app: dataui-todo-postgres
  ports:
    - port: 5432
      targetPort: 5432
